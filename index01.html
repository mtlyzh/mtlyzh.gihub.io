<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邓超凡第一章网页设计作业 | 科技蓝主题</title>
  <style>
    /* 全局样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* 主容器卡片 */
    .main-card {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out;
    }

    /* 返回首页按钮区域 */
    .nav-bar {
      background: #f8f9fa;
      padding: 15px 30px;
      border-bottom: 1px solid #eee;
    }

    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #3498db;
      font-weight: 500;
      transition: all 0.3s ease;
      padding: 8px 16px;
      border-radius: 8px;
      background: white;
    }

    .back-home:hover {
      background: #3498db;
      color: white;
      transform: translateX(-5px);
    }

    /* 页眉区域 */
    .header {
      background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      color: white;
      font-size: 2em;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .header .chapter-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 16px;
      border-radius: 30px;
      color: white;
      font-size: 0.9em;
      margin-top: 10px;
    }

    /* 内容区域 */
    .content {
      padding: 40px 30px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 3px solid #3498db;
    }

    .section-title span {
      font-size: 1.8em;
    }

    .section-title h2 {
      color: #2c3e50;
      font-size: 1.5em;
    }

    /* 案例作业列表 */
    .case-list {
      list-style: none;
      margin: 20px 0 30px 0;
    }

    .case-list li {
      margin-bottom: 15px;
    }

    .case-list li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      text-decoration: none;
      color: #2c3e50;
      font-size: 1.1em;
      font-weight: 500;
      background: #f8f9fa;
      border-radius: 12px;
      transition: all 0.3s ease;
      border-left: 4px solid transparent;
    }

    .case-list li a:hover {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      transform: translateX(8px);
      border-left-color: white;
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }

    /* 案例编号徽章 */
    .case-number {
      background: #3498db;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: normal;
      transition: all 0.3s ease;
    }

    .case-list li a:hover .case-number {
      background: white;
      color: #3498db;
    }

    /* 案例名称 */
    .case-name {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .case-icon {
      font-size: 1.3em;
    }

    /* 统计信息 */
    .stats {
      background: #f0f7ff;
      padding: 20px;
      border-radius: 12px;
      margin-top: 30px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-item {
      flex: 1;
    }

    .stat-number {
      font-size: 1.8em;
      font-weight: bold;
      color: #3498db;
    }

    .stat-label {
      color: #666;
      font-size: 0.85em;
      margin-top: 5px;
    }

    /* 页脚 */
    .footer {
      background: #f8f9fa;
      padding: 20px 30px;
      text-align: center;
      color: #666;
      border-top: 1px solid #eee;
      font-size: 0.9em;
    }

    /* 动画效果 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      body {
        padding: 20px 15px;
      }

      .header h1 {
        font-size: 1.5em;
      }

      .content {
        padding: 25px 20px;
      }

      .case-list li a {
        padding: 14px 16px;
        font-size: 1em;
      }

      .case-name {
        gap: 8px;
      }

      .case-icon {
        font-size: 1.1em;
      }

      .stats {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="main-card">
    <div class="nav-bar">
      <a href="../index.html" class="back-home">
        ← 返回首页
      </a>
    </div>

    <div class="header">
      <h1>📖 邓超凡的第一章作业</h1>
      <div class="chapter-badge">Chapter 1 | HTML基础入门</div>
    </div>

    <div class="content">
      <div class="section-title">
        <span>📚</span>
        <h2>本章案例作业</h2>
      </div>

      <ul class="case-list">
        <li>
          <a href="demo/demo0101.html">
            <div class="case-name">
              <span class="case-icon">📘</span>
              <span>案例作业 1-1</span>
            </div>
            <span class="case-number">查看详情 →</span>
          </a>
        </li>
        <li>
          <a href="demo/demo0102.html">
            <div class="case-name">
              <span class="case-icon">📗</span>
              <span>案例作业 1-2</span>
            </div>
            <span class="case-number">查看详情 →</span>
          </a>
        </li>
        <li>
          <a href="demo/demo0103.html">
            <div class="case-name">
              <span class="case-icon">📙</span>
              <span>案例作业 1-3</span>
            </div>
            <span class="case-number">查看详情 →</span>
          </a>
        </li>
      </ul>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-number">3</div>
          <div class="stat-label">已完成案例</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">HTML/CSS</div>
          <div class="stat-label">学习内容</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">100%</div>
          <div class="stat-label">完成进度</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>© 2026 231125088软工2班邓超凡作业 | 科技蓝主题 | 版权所有</p>
    </div>
  </div>
</body>

</html>
